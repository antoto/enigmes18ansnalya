<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SST - MISSION DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #6a11cb; --pink: #ff7eb9; --bg: #050510; --border: rgba(255, 255, 255, 0.1); --radar-color: rgba(255, 126, 185, 0.2); --speed: 4s; }
        body { font-family: 'Fira Code', monospace; background: var(--bg); margin: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s; }
        
        /* État Alerte Rouge */
        body.alert-mode { background: #1a0505; }
        body.alert-mode .radar-scanner { background: conic-gradient(from 0deg, transparent, #ff0000); animation: scan 1s linear infinite !important; }
        body.alert-mode .car-dot { background: #ff0000; box-shadow: 0 0 30px #ff0000; }
        body.alert-mode .badge { border-color: #ff0000; color: #ff0000; animation: blink 0.5s infinite; }

        .grid-bg { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); top: -50%; left: -50%; z-index: 0; opacity: 0.3; }
        .main-container { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; padding: 10px; }
        .badge { border: 1px solid var(--pink); color: var(--pink); padding: 5px 15px; border-radius: 50px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .radar-zone { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .radar-circle { width: 250px; height: 250px; border: 2px solid var(--border); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar-scanner { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent, var(--radar-color)); animation: scan var(--speed) linear infinite; }
        .car-dot { width: 15px; height: 15px; background: var(--pink); border-radius: 50%; box-shadow: 0 0 20px var(--pink); z-index: 5; }

        .footer { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 15px; backdrop-filter: blur(10px); }
        .progress-bar { width: 0%; height: 8px; background: linear-gradient(90deg, var(--accent), var(--pink)); border-radius: 10px; transition: width 1s ease; box-shadow: 0 0 15px var(--pink); }

        #popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .popup-box { border: 2px solid var(--pink); padding: 30px; border-radius: 30px; text-align: center; background: #000; }
        
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-container">
        <div class="header">
            <span id="status-badge" class="badge">Satellite Link: Secure</span>
            <h1 style="font-family:'Poppins'; font-size:1rem; margin-top:10px; letter-spacing:2px;">NALYA MISSION INTERFACE</h1>
        </div>
        <div class="radar-zone">
            <div class="radar-circle">
                <div class="radar-scanner"></div>
                <div class="car-dot"></div>
            </div>
        </div>
        <div class="footer">
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:10px;">
                <span>VITESSE: <span id="speed">0</span> KM/H</span>
                <span id="percent">0%</span>
            </div>
            <div style="background:rgba(255,255,255,0.1); border-radius:10px;"><div id="bar" class="progress-bar"></div></div>
        </div>
    </div>

    <div id="popup">
        <div class="popup-box">
            <h2 id="pop-title" style="color:var(--pink); text-transform:uppercase;">DATA</h2>
            <div id="pop-content" style="margin:20px 0; font-size:1.1rem;"></div>
            <button onclick="closePopup()" style="background:transparent; border:1px solid var(--pink); color:var(--pink); padding:10px 20px; border-radius:5px; cursor:pointer;">CONFIRMER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://missionnalya-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('currentMission').on('value', (s) => {
            const d = s.val();
            if(d && d.active) {
                // Activer le mode alerte si c'est le message final
                if(d.isFinal) {
                    document.body.classList.add('alert-mode');
                    document.getElementById('status-badge').innerText = "!!! CRITICAL OVERRIDE !!!";
                }
                document.getElementById('pop-title').innerText = d.title;
                document.getElementById('pop-content').innerHTML = d.html;
                document.getElementById('popup').style.display = 'flex';
            }
        });

        function closePopup() { document.getElementById('popup').style.display = 'none'; db.ref('currentMission').update({active:false}); }

        function update(pos) {
            const lat = pos.coords.latitude;
            const speed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0;
            document.getElementById('speed').innerText = speed;
            const dist = Math.abs(lat - 49.528) * 111;
            let p = Math.min((dist / 135) * 100, 100);
            document.getElementById('bar').style.width = p + "%";
            document.getElementById('percent').innerText = Math.floor(p) + "%";
        }
        navigator.geolocation.watchPosition(update, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
