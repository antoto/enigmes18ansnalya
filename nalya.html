<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SST - MISSION DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #6a11cb; --pink: #ff7eb9; --bg: #050510; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Fira Code', monospace; background: var(--bg); margin: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        .grid-bg { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); top: -50%; left: -50%; z-index: 0; opacity: 0.3; }
        .main-container { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; padding: 10px; }
        .badge { border: 1px solid var(--pink); color: var(--pink); padding: 5px 15px; border-radius: 50px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }
        .radar-zone { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .radar-circle { width: 220px; height: 220px; border: 2px solid var(--border); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar-scanner { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent, rgba(255, 126, 185, 0.2)); animation: scan 4s linear infinite; }
        .car-dot { width: 15px; height: 15px; background: var(--pink); border-radius: 50%; box-shadow: 0 0 20px var(--pink); position: relative; z-index: 5; }
        .car-dot::after { content:''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--pink); animation: pulse 2s infinite; left: 0; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 10px; border-radius: 12px; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.55rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--pink); }
        .footer { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 15px; backdrop-filter: blur(10px); }
        .progress-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--pink)); box-shadow: 0 0 15px var(--pink); transition: width 1s ease; }
        #popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,15,0.98); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .popup-box { border: 2px solid var(--pink); padding: 30px; border-radius: 30px; text-align: center; max-width: 500px; background: #050510; box-shadow: 0 0 50px rgba(255,126,185,0.2); }
        .popup-title { font-family: 'Poppins'; font-weight: 900; color: var(--pink); text-transform: uppercase; font-size: 1.5rem; margin-bottom: 15px; }
        .close-btn { background: transparent; border: 1px solid var(--pink); color: var(--pink); padding: 10px 25px; border-radius: 8px; font-family: 'Fira Code'; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-container">
        <div class="header">
            <span class="badge">Satellite Link: Secure</span>
            <h1 style="font-family:'Poppins'; font-size:1rem; margin-top:10px;">MISSION INTERFACE N-18</h1>
        </div>
        <div class="radar-zone">
            <div class="radar-circle"><div class="radar-scanner"></div><div class="car-dot"></div></div>
        </div>
        <div class="data-grid">
            <div class="stat-card"><div class="stat-label">Velocity</div><div class="stat-value"><span id="speed">0</span> km/h</div></div>
            <div class="stat-card"><div class="stat-label">Mission Timer</div><div class="stat-value" id="timer">00:00</div></div>
        </div>
        <div class="footer">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem;"><span>PROGRESSION</span><span id="percent">0%</span></div>
            <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
        </div>
    </div>
    <div id="popup">
        <div class="popup-box">
            <div class="popup-title" id="pop-title">ENCRYPTED DATA</div>
            <div id="pop-content" style="line-height:1.4;"></div>
            <button class="close-btn" onclick="closePopup()">Décrypter & Fermer</button>
        </div>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://missionnalya-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let seconds = 0; setInterval(() => { seconds++; let m=Math.floor(seconds/60); let s=seconds%60; document.getElementById('timer').innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s); }, 1000);
        db.ref('currentMission').on('value', (s) => {
            const d = s.val();
            if(d && d.active) {
                document.getElementById('pop-title').innerText = d.title;
                document.getElementById('pop-content').innerHTML = d.html;
                document.getElementById('popup').style.display = 'flex';
            }
        });
        function closePopup() { document.getElementById('popup').style.display = 'none'; db.ref('currentMission').update({active: false}); }
        function update(pos) {
            const lat = pos.coords.latitude;
            const speed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0;
            document.getElementById('speed').innerText = speed;
            const startLat = 49.528;
            const dist = Math.abs(lat - startLat) * 111; // Approx km
            let p = Math.min((dist / 135) * 100, 100);
            document.getElementById('bar').style.width = p + "%";
            document.getElementById('percent').innerText = Math.floor(p) + "%";
        }
        navigator.geolocation.watchPosition(update, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
