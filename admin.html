<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050510; color: white; font-family: sans-serif; padding: 20px; }
        .btn { width: 100%; padding: 18px; margin-bottom: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .step { color: #888; font-size: 0.7rem; margin-bottom: 5px; display: block; }
        .blue { background: #4834d4; }
        .pink { background: #be2edd; }
        .red { background: #eb4d4b; box-shadow: 0 0 15px #eb4d4b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h3 style="text-align:center;">COMMANDANT ETHAN</h3>

    <span class="step">DÉBUT DE TRAJET</span>
    <button class="btn blue" onclick="send('SYSTÈME', 'Liaison établie. Agent Nalya, la mission commence.', false)">Lancer la mission</button>

    <span class="step">MILIEU DE TRAJET (Doutes)</span>
    <button class="btn pink" onclick="send('INDICE', 'Le lieu que nous visons est lié à Saint Louis. Analyse en cours...', false)">Indice Saint Louis</button>
    <button class="btn pink" onclick="send('ALERTE', 'Brouillage détecté. Nous changeons de direction. Ne regarde pas la route.', false)">Fausse Alerte Direction</button>

    <span class="step">10 MIN AVANT POISSY (Le clou du spectacle)</span>
    <button class="btn red" onclick="send('INTERCEPTION', '<h1 style=\'color:red\'>ALERTE ROUGE</h1><p>Nous sommes repérés. Le radar passe en mode haute fréquence. Destination finale identifiée : POISSY.</p>', true)">⚠️ ACTIVER MODE INTERCEPTION</button>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({ databaseURL: "https://missionnalya-default-rtdb.firebaseio.com/" });
        const db = firebase.database();
        function send(t, h, isFinal) {
            db.ref('currentMission').set({ title: t, html: h, active: true, isFinal: isFinal });
        }
    </script>
</body>
</html>
